services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: ["http", "app:8000"]
    env_file: .env
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - app
    restart: unless-stopped
